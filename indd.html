    <script>
   const debounce = (fn, delay = 1000) => {
  let timer;

  return function (...args) {
    clearTimeout(timer);

    timer = setTimeout(() => {
      fn.apply(this, args);
    }, delay);
  };
};

function sec() {
  console.log("object");
}

const debouncedSec = debounce(sec, 2000);

debouncedSec(); // Call it
