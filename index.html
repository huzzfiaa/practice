<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- SEO -->
  <title>Music Player | Trending Songs</title>
  <meta name="description" content="Listen to trending songs with poster and play button. Simple music player built with JavaScript." />
  <meta name="keywords" content="music player, songs, audio, javascript player, trending music" />
  <meta name="author" content="Your Name" />

  <!-- Open Graph (share preview) -->
  <meta property="og:title" content="Music Player" />
  <meta property="og:description" content="Play trending songs easily" />
  <meta property="og:type" content="website" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      background: #000;
    }

    .card {
      margin: 40px auto;
      max-width: 300px;
      background: #1c1c1c;
      padding: 20px;
      border-radius: 12px;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .title {
      margin: 15px 0;
      font-size: 18px;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #00ff88;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
    }

    button:hover {
      background: #00cc6a;
    }
  </style>
</head>

<body>

  <header>
    🎵 Trending Music Player
  </header>

 

  <!-- Audio -->
  <audio id="audio"></audio>

  <script src="script.js"></script>
